spec_version: 1
version: 0.1.0
name: openenv-sme-negotiator
description: >
  SME vs large-buyer payment-term negotiation (Razorpay Fix My Itch B2B itch 82.8).
  Working-capital state, deterministic graders, OpenEnv HTTP API.
type: text
runtime: fastapi
app: server.app:app
port: 7860

action:
  type: object
  description: Negotiation action (price, payment_days, optional financing clauses).
  schema_ref: NegotiationAction

observation:
  type: object
  description: Round observation with buyer counters and SME financial context.
  schema_ref: NegotiationObservation

tasks:
  - name: payment-terms-easy
    description: Single SME vs cooperative buyer — reduce payment terms from 90d toward 60d or better.
    difficulty: easy
  - name: payment-terms-medium
    description: Working-capital stress — tighten toward 45d and agree a late payment penalty clause.
    difficulty: medium
  - name: payment-terms-hard
    description: Hostile two-buyer consortium — negotiate dynamic discounting; reward uses NPV vs status quo.
    difficulty: hard

---
spec_version: 1
version: 0.1.0
name: treasury-agent
description: >
  TreasuryAgent: POMDP RL environment for SME treasury & supply-chain finance.
  Multiple SMEs, buyers, and vendors modeled as a NetworkX supply-chain graph.
  SimPy discrete-event simulation drives invoice lifecycle and cash flow.
  Agent interacts via structured JSON tool calls to six enterprise apps:
  ERP, Bank, TReDS, Dynamic Discounting, Compliance, and Analytics.
  Multi-objective reward: solvency + financing cost + vendor stress + concentration risk.
type: text
runtime: fastapi
app: server.treasury_app:app
port: 7862

action:
  type: object
  description: >
    Structured JSON tool call — one of six enterprise app endpoints.
    Must include role, command_type, app, endpoint, and params.
  schema_ref: TreasuryAction

observation:
  type: object
  description: >
    Partial observation (POMDP): KPI aggregates visible to agent.
    Hidden state (buyer credit scores, vendor stress, invoice amounts) is not disclosed.
  schema_ref: TreasuryObservation

tasks:
  - name: treasury-easy
    description: >
      Single SME with one buyer at 90-day terms.
      Keep solvent over 90 days using ERP queries and overdraft.
    difficulty: easy
  - name: treasury-medium
    description: >
      Two SMEs, two buyers (60-75 day terms), TReDS and dynamic discounting available.
      Minimize combined financing cost over 180 days.
    difficulty: medium
  - name: treasury-hard
    description: >
      Three SMEs, three buyers, full compliance risk (Section 43B(h)).
      Samadhaan escalation available but relationship-damaging.
      Minimize financing cost and concentration risk over 365 days.
    difficulty: hard

---
spec_version: 1
version: 0.1.0
name: openenv-sme-multiagent-world
description: >
  Multi-agent world environment for SME payment-term negotiations.
  Supports four interaction modes: competitive bidding (A), coalition bargaining (B),
  oversight arena (C), and manager orchestration (D).
  Designed for LLM control via language actions and observations.
type: text
runtime: fastapi
app: server.world_app:app
port: 7861

action:
  type: object
  description: World action for the active principal agent (SME / oversight / manager).
  schema_ref: WorldAction

observation:
  type: object
  description: Language-centric world observation with partial observability enforced.
  schema_ref: WorldObservation

tasks:
  - name: competitive-bidding
    description: "Mode A — 2-3 SMEs compete for a single buyer's contract. Principal: one SME."
    difficulty: medium
  - name: coalition-bargaining
    description: "Mode B — SMEs form a coalition before negotiating with buyers. Principal: one SME."
    difficulty: medium
  - name: oversight-arena
    description: "Mode C — OversightAgent supervises a fleet of parallel SME-buyer negotiations."
    difficulty: hard
  - name: manager-orchestration
    description: "Mode D — ManagerAgent orchestrates multiple SME agents toward global solvency goals."
    difficulty: hard

---
spec_version: 1
version: 0.1.0
name: treasury-command-center
description: >
  TreasuryCommandCenter: advanced POMDP RL environment merging multi-agent world
  scheduling (from openenv-sme-multiagent-world) with the full SimPy+NetworkX
  treasury simulation (from treasury-agent). Five modes: SOLO (single Treasury AI
  Officer), MULTI (per-SME agents with CTDE scheduling), COALITION (SME coordination
  channel before tool calls), OVERSIGHT (OversightAgent flags portfolio risks),
  MANAGER (ManagerAgent issues per-SME instructions). Six real enterprise tool apps:
  ERP, Bank, TReDS, Dynamic Discounting, Compliance, Analytics. Supports GRPO/RLVR
  training, DreamerV3-inspired world model, and PAIRED autocurriculum.
type: text
runtime: fastapi
app: server.treasury_cc_app:app
port: 7863

action:
  type: object
  description: >
    Unified TreasuryCCAction covering all 5 modes.
    Role routing: treasury_officer/sme_agent → tool call (app+endpoint+params);
    oversight_agent → flag_risky_smes + suggested_interventions;
    manager_agent → instructions + query_analytics.
    GRPO fields: group_id, reasoning_trace.
  schema_ref: TreasuryCCAction

observation:
  type: object
  description: >
    Partial POMDP observation with KPIs for acting SME only.
    Includes GRPO signals (grpo_group_rewards, normalized_advantage),
    world model signals (belief_entropy, predicted_cash_buffer_30d),
    and curriculum signals (curriculum_difficulty, scenario_complexity).
  schema_ref: TreasuryCCObservation

tasks:
  # SOLO mode
  - name: tcc-solo-easy
    description: "Single Treasury Officer manages 1 SME over 90 days. ERP + Bank tools."
    difficulty: easy
  - name: tcc-solo-medium
    description: "Single Treasury Officer manages 2 SMEs + TReDS/DD over 180 days."
    difficulty: medium
  - name: tcc-solo-hard
    description: "Single Treasury Officer: 3 SMEs, full compliance risk, 365-day horizon."
    difficulty: hard
  # MULTI mode (CTDE)
  - name: tcc-multi-medium
    description: "Per-SME agents with CTDE scheduling; 2 SMEs, round-robin tool calls."
    difficulty: medium
  - name: tcc-multi-hard
    description: "Per-SME agents; 3 SMEs, hostile buyers, full compliance, self-rewarding."
    difficulty: hard
  # COALITION mode
  - name: tcc-coalition-medium
    description: "SMEs coordinate via coalition channel before tool calls; 2 SMEs."
    difficulty: medium
  - name: tcc-coalition-hard
    description: "Coalition + full compliance; 3 SMEs, adversarial buyers."
    difficulty: hard
  # OVERSIGHT mode
  - name: tcc-oversight-hard
    description: "OversightAgent reads analytics dashboard and flags at-risk SMEs."
    difficulty: hard
  # MANAGER mode
  - name: tcc-manager-hard
    description: "ManagerAgent issues per-SME instructions; 3 SMEs, 6-month horizon."
    difficulty: hard
